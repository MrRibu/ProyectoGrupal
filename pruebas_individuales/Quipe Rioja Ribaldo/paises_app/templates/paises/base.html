{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Atlas Mundial{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:     #0f0e0c;
      --parch:   #f5f0e8;
      --cream:   #faf7f2;
      --gold:    #c9922a;
      --gold-lt: #e8bb6e;
      --rust:    #8b3a2a;
      --teal:    #2a6b6e;
      --border:  #d4c9b0;
      --shadow:  rgba(15,14,12,0.12);
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      background: var(--ink);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky; top: 0; z-index: 100;
      border-bottom: 3px solid var(--gold);
    }
    .nav-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .nav-brand span { color: #fff; font-weight: 400; }
    .nav-link {
      color: var(--border);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.5rem 1rem;
      border: 1px solid transparent;
      border-radius: 4px;
      transition: all .2s;
    }
    .nav-link:hover, .nav-link.active {
      color: var(--gold);
      border-color: var(--gold);
    }

    /* ── MAIN LAYOUT ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    /* ── MESSAGES ── */
    .messages { list-style: none; margin-bottom: 1.5rem; }
    .messages li {
      padding: .75rem 1.25rem;
      border-radius: 6px;
      font-size: .9rem;
      border-left: 4px solid var(--gold);
      background: #fff9ee;
      margin-bottom: .5rem;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      border-bottom: 2px solid var(--border);
      padding-bottom: 1.5rem;
      margin-bottom: 2.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 900;
      line-height: 1.1;
      color: var(--ink);
    }
    .page-header h1 small {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      font-weight: 400;
      color: #888;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: .25rem;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .6rem 1.3rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      border: 2px solid transparent;
      text-decoration: none;
      transition: all .2s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--gold); color: #fff; border-color: var(--gold); }
    .btn-primary:hover { background: #b07e22; border-color: #b07e22; }
    .btn-outline { background: transparent; color: var(--ink); border-color: var(--border); }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .btn-danger  { background: transparent; color: var(--rust); border-color: var(--rust); }
    .btn-danger:hover  { background: var(--rust); color: #fff; }
    .btn-teal   { background: var(--teal); color: #fff; border-color: var(--teal); }
    .btn-teal:hover { background: #1e5254; }
    .btn-sm { padding: .35rem .8rem; font-size: .8rem; }

    /* ── CARDS ── */
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px var(--shadow); }

    /* ── FORMS ── */
    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: .4rem;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: .65rem .9rem;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--ink);
      background: var(--cream);
      transition: border-color .2s;
      outline: none;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--gold); background: #fff; }
    .form-group .errorlist { color: var(--rust); font-size: .8rem; margin-top: .3rem; list-style: none; }

    /* ── GRID ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    @media (max-width: 700px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

    /* ── BADGE ── */
    .badge {
      display: inline-block;
      padding: .2rem .6rem;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .badge-gold  { background: #fff3d6; color: var(--gold); border: 1px solid var(--gold-lt); }
    .badge-teal  { background: #d6efee; color: var(--teal); border: 1px solid #9dd0cf; }
    .badge-rust  { background: #f5ddd9; color: var(--rust); border: 1px solid #e8b5ac; }

    /* ── DECORATIVE RULE ── */
    .ornament {
      text-align: center;
      color: var(--gold);
      font-size: 1.1rem;
      letter-spacing: .5em;
      margin: 2rem 0;
      opacity: .5;
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

<nav>
  <a href="{% url 'lista_paises' %}" class="nav-brand">Atlas <span>Mundial</span></a>
  <a href="{% url 'crear_pais' %}" class="nav-link">+ Nuevo País</a>
</nav>

<div class="container">
  {% if messages %}
    <ul class="messages">
      {% for msg in messages %}<li>{{ msg }}</li>{% endfor %}
    </ul>
  {% endif %}
  {% block content %}{% endblock %}
</div>

</body>
</html>
